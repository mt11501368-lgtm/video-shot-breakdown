name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Video Shot Breakdown.
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: Include the command or Codex prompt you used.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.x, FFmpeg version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Remove private paths, tokens, and copyrighted media before posting.
      render: shell
