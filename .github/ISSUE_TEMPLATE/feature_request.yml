name: Feature request
description: Suggest a useful improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What video-analysis or production problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Describe the workflow or output you would like.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Add a sample prompt, field, or expected result if possible.
